server:
  port: 8080

spring:
  application:
    name: trattoria-roma-api
  
  datasource:
    url: jdbc:postgresql://postgres:5432/appdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000,http://localhost

logging:
  level:
    com.app.api: INFO
    org.springframework.web: INFO
